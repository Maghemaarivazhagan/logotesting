<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewelry Rebrander Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f1f5f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 480px; box-sizing: border-box; }
        
        /* Logo Preview Style */
        .logo-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        #logoPreview { width: 60px; height: 60px; border-radius: 50%; border: 2px dashed #cbd5e1; object-fit: contain; background: #fff; }

        /* Thumbnail Scroller */
        .thumb-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; flex-shrink: 0; border: 3px solid transparent; opacity: 0.6; }
        .thumb.active { border-color: var(--p); opacity: 1; transform: scale(1.05); }

        canvas { width: 100%; border-radius: 15px; background: #eee; touch-action: none; border: 1px solid #e2e8f0; }
        .btn-go { background: #000; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px; }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; background: #e2e8f0; }
        .mode-btn.active { background: var(--p); color: white; }
        .status { text-align: center; margin-top: 10px; font-size: 14px; font-weight: 700; color: var(--p); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="logo-header">
        <img id="logoPreview" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
        <div style="flex:1">
            <label style="font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase;">1. Brand Logo</label>
            <input type="file" id="logoInp" accept="image/*" style="font-size: 12px;">
        </div>
    </div>

    <div class="group">
        <input type="text" id="phoneInp" placeholder="WhatsApp Number" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
    </div>

    <div style="margin: 15px 0;">
        <label style="font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase;">2. Select Batch</label>
        <input type="file" id="batchInp" accept="image/*" multiple style="width:100%;">
    </div>

    <!-- The Individual Preview Scroller -->
    <div id="thumbWrapper" class="thumb-scroller"></div>

    <div id="editorArea" style="display:none;">
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button id="lBtn" class="mode-btn active" onclick="setMode('logo')">Logo Area</button>
            <button id="pBtn" class="mode-btn" onclick="setMode('phone')">Phone Area</button>
            <button class="mode-btn" style="background:#f1f5f9; color:#000;" onclick="clearCurrent()">Reset</button>
        </div>
        <canvas id="cvs"></canvas>
    </div>

    <button class="btn-go" onclick="startProcess()">DOWNLOAD ALL (ZIP)</button>
    <div id="status" class="status">Ready</div>
</div>

<script>
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    let brandLogo = null, files = [], fileData = [], activeIdx = 0, editMode = 'logo';
    let isDrawing = false, startX, startY;

    // 1. Logo Preview Logic
    document.getElementById('logoInp').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            brandLogo = new Image();
            brandLogo.onload = () => { document.getElementById('logoPreview').src = ev.target.result; };
            brandLogo.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 2. Batch Upload & Thumbnail Creation
    document.getElementById('batchInp').onchange = (e) => {
        files = Array.from(e.target.files);
        fileData = files.map(f => ({ file: f, logoTarget: null, phoneTarget: null, color: "#ffffff" }));
        
        const wrapper = document.getElementById('thumbWrapper');
        wrapper.innerHTML = "";
        
        fileData.forEach((data, i) => {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(data.file);
            img.className = "thumb" + (i === 0 ? " active" : "");
            img.onclick = () => selectImage(i);
            wrapper.appendChild(img);
        });

        document.getElementById('editorArea').style.display = "block";
        selectImage(0);
    };

    function selectImage(idx) {
        activeIdx = idx;
        document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
        
        const img = new Image();
        img.onload = () => {
            cvs.width = img.width; cvs.height = img.height;
            fileData[activeIdx].imgObj = img;
            refreshCanvas();
        };
        img.src = URL.createObjectURL(fileData[activeIdx].file);
    }

    function refreshCanvas() {
        const data = fileData[activeIdx];
        if(!data.imgObj) return;
        ctx.drawImage(data.imgObj, 0, 0);
        
        if(data.logoTarget) {
            ctx.fillStyle = data.color; ctx.fillRect(data.logoTarget.x, data.logoTarget.y, data.logoTarget.w, data.logoTarget.h);
            ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 6; ctx.strokeRect(data.logoTarget.x, data.logoTarget.y, data.logoTarget.w, data.logoTarget.h);
        }
        if(data.phoneTarget) {
            ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.fillRect(data.phoneTarget.x, data.phoneTarget.y, data.phoneTarget.w, data.phoneTarget.h);
            ctx.strokeStyle = "#16a34a"; ctx.lineWidth = 6; ctx.strokeRect(data.phoneTarget.x, data.phoneTarget.y, data.phoneTarget.w, data.phoneTarget.h);
        }
    }

    // Drawing Logic
    function handleStart(x, y) {
        isDrawing = true;
        const rect = cvs.getBoundingClientRect();
        startX = (x - rect.left) * (cvs.width / rect.width);
        startY = (y - rect.top) * (cvs.height / rect.height);
        if(editMode === 'logo') {
            const p = ctx.getImageData(startX, startY, 1, 1).data;
            fileData[activeIdx].color = `rgb(${p[0]},${p[1]},${p[2]})`;
        }
    }

    function handleMove(x, y) {
        if(!isDrawing) return;
        const rect = cvs.getBoundingClientRect();
        const curX = (x - rect.left) * (cvs.width / rect.width);
        const curY = (y - rect.top) * (cvs.height / rect.height);
        const area = { x: startX, y: startY, w: curX - startX, h: curY - startY };
        if(editMode === 'logo') fileData[activeIdx].logoTarget = area;
        else fileData[activeIdx].phoneTarget = area;
        refreshCanvas();
    }

    cvs.onmousedown = (e) => handleStart(e.clientX, e.clientY);
    cvs.onmousemove = (e) => handleMove(e.clientX, e.clientY);
    window.onmouseup = () => isDrawing = false;
    cvs.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));
    cvs.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
    cvs.addEventListener('touchend', () => isDrawing = false);

    function setMode(m) { 
        editMode = m; 
        document.getElementById('lBtn').classList.toggle('active', m==='logo');
        document.getElementById('pBtn').classList.toggle('active', m==='phone');
    }
    function clearCurrent() {
        if(editMode === 'logo') fileData[activeIdx].logoTarget = null;
        else fileData[activeIdx].phoneTarget = null;
        refreshCanvas();
    }

    async function startProcess() {
        if(!fileData.length || !brandLogo) return alert("Upload logo and batch!");
        const zip = new JSZip(), phone = document.getElementById('phoneInp').value;
        for(let i=0; i<fileData.length; i++) {
            document.getElementById('status').innerText = `Finalizing ${i+1}/${fileData.length}`;
            const canvas = await renderFinal(fileData[i], phone);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
            zip.file(`jewel_${i+1}.jpg`, blob);
        }
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "Custom_Jewelry_Batch.zip";
        link.click();
        document.getElementById('status').innerText = "Complete!";
    }

    function renderFinal(data, phoneText) {
        return new Promise(res => {
            const c = document.createElement('canvas'), x = c.getContext('2d'), img = data.imgObj;
            c.width = img.width; c.height = img.height;
            x.drawImage(img, 0, 0);

            // Use custom target or default top-left
            const lT = data.logoTarget || { x: 30, y: 30, w: c.height*0.15, h: c.height*0.15 };
            if(data.logoTarget) { x.fillStyle = data.color; x.fillRect(lT.x, lT.y, lT.w, lT.h); }
            const s = Math.min(lT.w / brandLogo.width, lT.h / brandLogo.height);
            x.drawImage(brandLogo, lT.x, lT.y, brandLogo.width * s, brandLogo.height * s);

            // Use custom phone target or default bottom bar
            if(phoneText) {
                if(data.phoneTarget) {
                    x.fillStyle = "white"; x.fillRect(data.phoneTarget.x, data.phoneTarget.y, data.phoneTarget.w, data.phoneTarget.h);
                    x.fillStyle = "black"; x.font = `bold ${data.phoneTarget.h * 0.6}px sans-serif`;
                    x.textAlign = "center"; x.textBaseline = "middle";
                    x.fillText(phoneText, data.phoneTarget.x + (data.phoneTarget.w/2), data.phoneTarget.y + (data.phoneTarget.h/2));
                } else {
                    const bh = c.height * 0.08;
                    x.fillStyle = "white"; x.fillRect(0, c.height-bh, c.width, bh);
                    x.fillStyle = "black"; x.font = `bold ${bh*0.4}px sans-serif`;
                    x.textAlign = "right"; x.fillText(phoneText, c.width-30, c.height-bh/2+10);
                }
            }
            res(c);
        });
    }
</script>
</body>
</html>
