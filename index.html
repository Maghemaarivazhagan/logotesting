<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wholesale Studio | Enterprise Batch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px 20px; background: #090e1a; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 200; }
        .nav-link { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; color: #94a3b8; }
        .nav-link.active { background: var(--accent); color: white; }

        .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }

        #workspace { flex: 1; display: flex; overflow: hidden; position: relative; }
        #sidebar { width: 320px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; display: none; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 50; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .logo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .logo-item { background: white; padding: 5px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; height: 60px; display: flex; align-items: center; justify-content: center; }
        .logo-item img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050810; position: relative; padding: 10px; }
        canvas { max-width: 100%; max-height: 75vh; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        #form-view { position: absolute; inset: 0; background: var(--bg); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .form-card { width: 100%; max-width: 450px; padding: 30px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; margin-bottom: 10px; font-family: inherit; }

        #studio-footer { position: absolute; bottom: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 14px; display: none; gap: 12px; border: 1px solid var(--border); align-items: center; }
        .loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 18px;">WHOLESALE<span>STUDIO</span></div>
    <div style="display:flex; gap:10px;">
        <div class="nav-link active" id="tab-form" onclick="showView('form')">Setup</div>
        <div class="nav-link" id="tab-studio" onclick="showView('studio')">Studio</div>
    </div>
</header>

<div id="workspace">
    <div id="sidebar">
        <label>Selected Item Tools</label>
        <div id="edit-tools" style="display:none; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <textarea id="studioText" placeholder="Edit content..." oninput="syncEdit()"></textarea>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="color" id="textColor" oninput="syncEdit()" style="width:50px; height:40px; border:none; background:none; cursor:pointer;">
                <span style="font-size:10px; color:#64748b;">Drag handle to resize</span>
            </div>
        </div>

        <label>Add Elements</label>
        <button class="btn btn-ghost" style="width:100%; margin-bottom:10px;" onclick="addExtraText()">+ Add Extra Text</button>
        <div class="logo-grid" id="logoDrawer"></div>

        <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
            <button class="btn btn-primary" onclick="saveToAll()">💾 Sync Layout to All</button>
            <button class="btn btn-success" onclick="downloadCurrentAsZip()">📦 Download Current (ZIP)</button>
            <button class="btn btn-ghost" onclick="undo()" style="color: #ef4444;">↩ Undo Last</button>
        </div>
    </div>

    <div id="canvas-area">
        <canvas id="cvs"></canvas>
        <div id="studio-footer">
            <button class="btn btn-ghost" onclick="nav(-1)">Prev</button>
            <span id="counter" style="font-size:12px; font-weight:700;">1/1</span>
            <button class="btn btn-ghost" onclick="nav(1)">Next</button>
        </div>
    </div>

    <div id="form-view">
        <div class="form-card">
            <h2 style="margin-bottom: 20px;">Catalog Generator</h2>
            <label>1. Logos (ZIP or Images)</label>
            <input type="file" id="logoInp" accept="image/*,.zip" multiple>
            <label>2. Product Photos (ZIP or Images)</label>
            <input type="file" id="imgInp" accept="image/*,.zip" multiple>
            <label>3. Branding Text (Bottom-Left)</label>
            <input type="text" id="defaultText" placeholder="e.g. Code: 101 | Price: ₹499">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button class="btn btn-ghost" onclick="startProcessing('studio')">🎨 Enter Studio</button>
                <button class="btn btn-success" onclick="startProcessing('export')">📦 Fast Export (ZIPs)</button>
            </div>
        </div>
    </div>
</div>

<div class="loader" id="loader">
    <h2 id="load-title">Processing...</h2>
    <p id="load-detail" style="font-size:14px; margin-top:10px;"></p>
</div>

<script>
    let logos = [], images = [], activeIdx = 0;
    let selectedItem = null, dragMode = null; 
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');

    function showView(v) {
        if(v === 'studio' && images.length === 0) return;
        document.getElementById('form-view').style.display = v === 'form' ? 'flex' : 'none';
        document.getElementById('sidebar').style.display = v === 'studio' ? 'flex' : 'none';
        document.getElementById('studio-footer').style.display = v === 'studio' ? 'flex' : 'none';
        document.getElementById('tab-form').classList.toggle('active', v === 'form');
        document.getElementById('tab-studio').classList.toggle('active', v === 'studio');
        if(v === 'studio') loadImg(activeIdx);
    }

    async function handleZip(file) {
        const zip = new JSZip(), content = await zip.loadAsync(file), arr = [];
        for (let n in content.files) {
            if (!content.files[n].dir && /\.(jpe?g|png|webp)$/i.test(n)) {
                const blob = await content.files[n].async("blob");
                arr.push(new File([blob], n.split('/').pop(), { type: blob.type }));
            }
        }
        return arr;
    }

    document.getElementById('logoInp').onchange = async (e) => {
        let files = Array.from(e.target.files);
        if (files[0]?.name.endsWith('.zip')) files = await handleZip(files[0]);
        logos = [];
        for (let f of files) {
            const img = await new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = URL.createObjectURL(f); });
            logos.push({ img, name: f.name });
        }
        renderLogoDrawer();
    };

    async function startProcessing(mode) {
        let files = Array.from(document.getElementById('imgInp').files);
        if (files.length === 0) return alert("Select product photos!");
        if (files[0]?.name.endsWith('.zip')) files = await handleZip(files[0]);
        
        images = files.map(f => ({ name: f.name, url: URL.createObjectURL(f), imgObj: null, layers: [] }));
        const txt = document.getElementById('defaultText').value;
        
        images.forEach(img => {
            if(logos.length > 0) {
                const l = logos[0].img, w = 0.16, h = (l.height/l.width)*w;
                img.layers.push({ type: 'logo', img: l, x: 0.80, y: 0.82, w, h });
            }
            if(txt) img.layers.push({ type: 'text', text: txt, x: 0.05, y: 0.90, size: 0.05, color: '#ffffff' });
        });

        if(mode === 'export') exportBatch();
        else showView('studio');
    }

    function renderLogoDrawer() {
        const d = document.getElementById('logoDrawer'); d.innerHTML = '';
        logos.forEach((l, i) => {
            const div = document.createElement('div'); div.className = 'logo-item';
            div.innerHTML = `<img src="${l.img.src}">`;
            div.onclick = () => {
                const w = 0.16, h = (l.img.height/l.img.width)*w;
                images[activeIdx].layers.push({ type:'logo', img:l.img, x:0.4, y:0.4, w, h });
                draw();
            };
            d.appendChild(div);
        });
    }

    async function loadImg(idx) {
        activeIdx = idx; const d = images[idx];
        if(!d.imgObj) d.imgObj = await new Promise(r => { const i=new Image(); i.onload=()=>r(i); i.src=d.url; });
        cvs.width = d.imgObj.width; cvs.height = d.imgObj.height;
        draw();
        document.getElementById('counter').innerText = `${activeIdx+1}/${images.length}`;
    }

    function draw() {
        const d = images[activeIdx]; if(!d) return;
        ctx.drawImage(d.imgObj, 0, 0);
        d.layers.forEach(l => {
            const x = l.x*cvs.width, y = l.y*cvs.height;
            if(l.type === 'logo') {
                const w = l.w*cvs.width, h = l.h*cvs.height;
                ctx.drawImage(l.img, x, y, w, h);
                if(l === selectedItem) {
                    ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4; ctx.strokeRect(x,y,w,h);
                    ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(x+w, y+h, 20, 0, Math.PI*2); ctx.fill();
                }
            } else {
                const s = l.size*cvs.width;
                ctx.font = `bold ${s}px Inter`; ctx.fillStyle = l.color;
                ctx.shadowColor = "rgba(0,0,0,0.7)"; ctx.shadowBlur = 10;
                l.text.split('\n').forEach((line, i) => ctx.fillText(line, x, y + (i*s*1.2)));
                if(l === selectedItem) {
                    const tw = ctx.measureText(l.text).width;
                    ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.strokeRect(x, y-s, tw, s*1.3);
                    ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(x+tw, y, 20, 0, Math.PI*2); ctx.fill();
                }
            }
        });
    }

    function handleDown(e) {
        const r = cvs.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (cx - r.left) / r.width, y = (cy - r.top) / r.height;

        if (selectedItem) {
            const sx = selectedItem.x*cvs.width, sy = selectedItem.y*cvs.height;
            const sw = (selectedItem.w || 0.1)*cvs.width, sh = (selectedItem.h || selectedItem.size)*cvs.height;
            if (Math.hypot((x*cvs.width)-(sx+sw), (y*cvs.height)-sy) < 50 || Math.hypot((x*cvs.width)-(sx+sw), (y*cvs.height)-(sy+sh)) < 50) {
                dragMode = 'resize'; return;
            }
        }

        selectedItem = images[activeIdx].layers.slice().reverse().find(l => x > l.x && x < l.x+(l.w||0.15) && y > l.y-(l.size||0.05) && y < l.y+(l.h||0.15));
        const tools = document.getElementById('edit-tools');
        if(selectedItem && selectedItem.type === 'text') {
            tools.style.display = 'block';
            document.getElementById('studioText').value = selectedItem.text;
            document.getElementById('textColor').value = selectedItem.color;
        } else { tools.style.display = 'none'; }
        
        if(selectedItem) dragMode = 'move';
        draw();
    }

    function handleMove(e) {
        if(!selectedItem || !dragMode) return; e.preventDefault();
        const r = cvs.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (cx - r.left) / r.width, y = (cy - r.top) / r.height;

        if (dragMode === 'move') { selectedItem.x = x; selectedItem.y = y; }
        else {
            const nw = Math.max(0.02, x - selectedItem.x);
            if(selectedItem.type==='logo') { selectedItem.w = nw; selectedItem.h = (selectedItem.img.height/selectedItem.img.width)*nw; }
            else { selectedItem.size = nw/2; }
        }
        draw();
    }

    cvs.addEventListener('mousedown', handleDown);
    cvs.addEventListener('touchstart', handleDown);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('mouseup', () => dragMode = null);
    window.addEventListener('touchend', () => dragMode = null);

    function addExtraText() { images[activeIdx].layers.push({ type: 'text', text: 'New Text', x: 0.4, y: 0.4, size: 0.05, color: '#ffffff' }); draw(); }
    function syncEdit() { if(selectedItem && selectedItem.type === 'text') { selectedItem.text = document.getElementById('studioText').value; selectedItem.color = document.getElementById('textColor').value; draw(); } }
    function undo() { images[activeIdx].layers.pop(); selectedItem = null; draw(); }
    function nav(d) { let n = activeIdx + d; if(n >= 0 && n < images.length) { selectedItem = null; loadImg(n); } }
    
    function saveToAll() {
        const t = images[activeIdx].layers.map(l => ({...l}));
        images.forEach((img, i) => { if(i !== activeIdx) img.layers = t.map(tl => ({...tl})); });
        alert("Synced layout to all!");
    }

    // DIRECT ZIP DOWNLOAD FOR CURRENT STUDIO WORK
    async function downloadCurrentAsZip() {
        draw();
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        document.getElementById('load-title').innerText = "Generating ZIP...";
        
        const zip = new JSZip();
        const blob = await new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.95));
        zip.file(`custom_${images[activeIdx].name || 'design'}.jpg`, blob);
        
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `Custom_Single_${Date.now()}.zip`;
        a.click();
        
        loader.style.display = 'none';
    }

    // BATCH EXPORT LOGIC (ZIP PER LOGO)
    async function exportBatch() {
        if(images.length === 0) return alert("Nothing to export!");
        const loader = document.getElementById('loader'), title = document.getElementById('load-title'), detail = document.getElementById('load-detail');
        loader.style.display = 'flex';
        
        for (let lIdx = 0; lIdx < Math.max(1, logos.length); lIdx++) {
            const logoRef = logos[lIdx];
            title.innerText = `Logo ${lIdx + 1} of ${logos.length}`;
            detail.innerText = `Packaging ZIP: ${logoRef ? logoRef.name : 'Standard'}`;

            const zip = new JSZip();
            for (let i = 0; i < images.length; i++) {
                await loadImg(i);
                if(logoRef) {
                    images[i].layers.filter(l => l.type === 'logo').forEach(l => l.img = logoRef.img);
                }
                draw();
                const blob = await new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.9));
                zip.file(`product_${i+1}.jpg`, blob);
            }
            
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = logoRef ? `Batch_${logoRef.name.split('.')[0]}.zip` : `Export_Batch.zip`;
            a.click();
            await new Promise(r => setTimeout(r, 1000));
        }
        loader.style.display = 'none';
    }
</script>
</body>
</html>
